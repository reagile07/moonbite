<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Moon Bite Cuisine</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <img src="images/logo.png" alt="Moon Bite Cuisine logo" class="logo" />

  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="dishes.html">Dishes</a>
  <a href="recipes.html">Recipes</a>
  <a href="feedback.html">Feedback</a>
  <a href="contact.html">Contact</a>
</nav>

<header class="hero">
  <div class="hero-content">
    <h1>We Value Your Feedback</h1>
    <p>Tell us what you think about Moon Bite Cuisine</p>
  </div>
</header>

<main class="feedback-container">

  <section class="feedback-box">

    <h2>Send Us Your Feedback</h2>

    <form action="#" method="post">

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="rating">Rate Our Website</label>
      <select id="rating" name="rating">
        <option value="excellent">Excellent</option>
        <option value="good">Good</option>
        <option value="average">Average</option>
        <option value="poor">Poor</option>
      </select>

      <label for="message">Your Feedback</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your feedback here..." required></textarea>

      <button type="submit">Submit Feedback</button>

    </form>

  </section>

</main>

<footer class="footer">
  <p>© 2026 Moon Bite Cuisine</p>
  <p>Celebrating African traditional food</p>
</footer>

</body>
</html>
